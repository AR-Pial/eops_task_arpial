services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Live code for local review — no rebuild needed for Python/Django edits
      - ./backend:/app
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    environment:
      # Override host values so the API talks to Compose services
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: eops
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
